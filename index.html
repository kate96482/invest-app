<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>保單理財小管家 - 專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; -webkit-font-smoothing: antialiased; }
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .kpi-card-main { grid-column: span 2; }
        .soft-shadow { box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        .gold-gradient { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); }
        
        /* 截圖預備樣式：確保截圖時背景與邊距完美 */
        .export-mode { 
            padding: 30px !important; 
            background: white !important; 
            display: flex !important; 
            flex-direction: column !important; 
            justify-content: center !important; 
        }
    </style>
</head>
<body class="pb-10">

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/80 flex flex-col items-center justify-center z-[9999]">
        <div class="w-12 h-12 border-4 border-slate-900 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-slate-900 font-black">正在生成專家圖卡...</p>
    </div>

    <div class="max-w-md mx-auto px-4 py-6">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black text-slate-800">資產分析助手</h1>
                <p id="clientNameDisplay" class="text-indigo-600 font-bold text-sm">請先導入數據</p>
            </div>
            <div class="bg-slate-100 px-3 py-1 rounded-lg text-right">
                <span class="text-[10px] text-slate-400 font-bold block">USD/TWD</span>
                <span id="rateDisplay" class="text-xs font-black text-slate-700">32.50</span>
            </div>
        </header>

        <div id="uploadArea" class="bg-white p-10 rounded-[2.5rem] soft-shadow border-2 border-dashed border-slate-200 text-center mb-6">
            <div class="text-5xl mb-4">📊</div>
            <h3 class="font-bold text-slate-700">導入客戶 Excel</h3>
            <input type="file" id="upload" accept=".xlsx, .xls" class="hidden"/>
            <button onclick="document.getElementById('upload').click()" class="mt-6 bg-slate-900 text-white px-8 py-3 rounded-xl font-bold">選擇檔案</button>
        </div>

        <div id="dashboard" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-3xl soft-shadow mb-4">
                <select id="clientSelector" class="w-full bg-slate-50 border-0 p-3 rounded-xl font-bold text-slate-800 outline-none"></select>
            </div>

            <div id="exportTarget" class="space-y-4 bg-white rounded-[2rem]">
                <div id="kpiSection" class="kpi-grid">
                    <div class="kpi-card-main bg-slate-900 p-6 rounded-[2rem] text-white relative overflow-hidden">
                        <p class="text-[10px] font-bold opacity-50 tracking-widest uppercase">總投資市值 (TWD)</p>
                        <p id="kpi1" class="text-3xl font-black mt-1">$0</p>
                        <div class="absolute -right-2 -bottom-2 text-white/5 text-5xl font-black italic">ASSET</div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-[1.5rem] border border-slate-100 relative">
                        <p class="text-[10px] font-bold text-slate-400">投入本金</p>
                        <p id="kpi2" class="text-lg font-black text-slate-800">$0</p>
                        <span id="marketFluctPercent" class="absolute top-4 right-4 text-[9px] font-black px-1.5 py-0.5 rounded-md"></span>
                    </div>
                    <div class="bg-amber-50 p-4 rounded-[1.5rem] border border-amber-100">
                        <p class="text-[10px] font-bold text-amber-600">累積配息</p>
                        <p id="kpi3" class="text-lg font-black text-amber-900">$0</p>
                    </div>
                    <div class="bg-indigo-50 p-4 rounded-[1.5rem] border border-indigo-100">
                        <p class="text-[10px] font-bold text-indigo-600">預估月配息</p>
                        <p id="kpi4" class="text-lg font-black text-indigo-900">$0</p>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-[1.5rem] border border-emerald-100">
                        <p class="text-[10px] font-bold text-emerald-600">含息總報酬</p>
                        <p id="kpi5" class="text-lg font-black text-emerald-900">$0</p>
                    </div>
                </div>

                <div class="p-5 bg-white rounded-[2rem] border border-slate-100">
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <h4 class="font-black text-slate-800 text-sm">長期配息增長趨勢</h4>
                            <p class="text-[10px] text-slate-400">累積回本率：<span id="indivPaybackRate" class="text-amber-600 font-black">0%</span></p>
                        </div>
                        <span id="indivDivTotal" class="text-amber-500 font-black text-xl">$0</span>
                    </div>
                    <div class="h-24 w-full flex items-end gap-2 px-2">
                        <div class="flex-1 bg-amber-100 rounded-t-lg" style="height: 20%"></div>
                        <div class="flex-1 bg-amber-200 rounded-t-lg" style="height: 35%"></div>
                        <div class="flex-1 bg-amber-300 rounded-t-lg" style="height: 55%"></div>
                        <div class="flex-1 bg-amber-400 rounded-t-lg" style="height: 75%"></div>
                        <div class="flex-1 gold-gradient rounded-t-lg shadow-lg" style="height: 100%"></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-4">
                <button id="exportImgBtn" class="bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                    生成 1:1 分享圖卡
                </button>
                <button onclick="location.reload()" class="bg-slate-200 text-slate-600 py-4 rounded-2xl font-bold">
                    重新上傳
                </button>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let currentUsdRate = 32.50;
        const FUND_PARAMS = { "DSP5": { nav: 8.4495, divRate: 0.055 }, "NGB2": { nav: 41.81, divRate: 0.59 } };

        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                initDashboard();
            };
            reader.readAsArrayBuffer(file);
        });

        function initDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('uploadArea').classList.add('hidden');
            const selector = document.getElementById('clientSelector');
            const clients = [...new Set(rawData.map(i => i['客戶名稱']))];
            selector.innerHTML = clients.map(c => `<option value="${c}">${c}</option>`).join('');
            updateUI(clients[0]);
            selector.addEventListener('change', (e) => updateUI(e.target.value));
        }

        function updateUI(name) {
            document.getElementById('clientNameDisplay').innerText = `客戶：${name}`;
            const filtered = rawData.filter(d => d['客戶名稱'] === name);
            let k = { mv: 0, div: 0, month: 0, total: 0, cap: 0 };
            
            filtered.forEach(row => {
                const units = parseFloat(row['累積單位數']) || 0;
                const capital = parseFloat(row['投資本金']) || 0;
                const cumDiv = parseFloat(row['累積配息']) || 0;
                const fund = FUND_PARAMS[row['基金標的']] || { nav: 0, divRate: 0 };
                
                const mvTwd = units * fund.nav * currentUsdRate;
                k.mv += mvTwd;
                k.div += (row['幣別'] === '美元' ? cumDiv * currentUsdRate : cumDiv);
                k.cap += (row['幣別'] === '美元' ? capital * currentUsdRate : capital);
                k.month += (units * fund.divRate * currentUsdRate);
            });
            k.total = (k.mv + k.div) - k.cap;

            // 更新 DOM
            document.getElementById('kpi1').innerText = '$' + Math.round(k.mv).toLocaleString();
            document.getElementById('kpi2').innerText = '$' + Math.round(k.cap).toLocaleString();
            document.getElementById('kpi3').innerText = '$' + Math.round(k.div).toLocaleString();
            document.getElementById('kpi4').innerText = '$' + Math.round(k.month).toLocaleString();
            document.getElementById('kpi5').innerText = '$' + Math.round(k.total).toLocaleString();
            
            const fluctPct = ((k.mv - k.cap) / k.cap * 100).toFixed(2);
            const pctEl = document.getElementById('marketFluctPercent');
            pctEl.innerText = (fluctPct >= 0 ? '+' : '') + fluctPct + '%';
            pctEl.className = `absolute top-4 right-4 text-[9px] font-black px-1.5 py-0.5 rounded-md ${fluctPct >= 0 ? 'text-emerald-600 bg-emerald-100' : 'text-rose-600 bg-rose-100'}`;
            
            document.getElementById('indivDivTotal').innerText = '$' + Math.round(k.div).toLocaleString();
            document.getElementById('indivPaybackRate').innerText = (k.div / k.cap * 100).toFixed(2) + '%';
        }

        // 🟢 截圖核心修正
        document.getElementById('exportImgBtn').addEventListener('click', async function() {
            const target = document.getElementById('exportTarget');
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden');

            // 暫時套用截圖專用樣式 (1:1 強制與美化)
            target.classList.add('export-mode');
            target.style.width = "500px"; 
            target.style.height = "500px";

            try {
                const canvas = await html2canvas(target, {
                    scale: 3, // 高清輸出
                    useCORS: true,
                    backgroundColor: "#ffffff",
                    width: 500,
                    height: 500
                });

                const imgData = canvas.toDataURL("image/png");
                showPreview(imgData);
            } catch (err) {
                alert("生成失敗");
            } finally {
                // 還原樣式
                target.classList.remove('export-mode');
                target.style.width = "";
                target.style.height = "";
                overlay.classList.add('hidden');
            }
        });

        function showPreview(src) {
            const div = document.createElement('div');
            div.className = "fixed inset-0 bg-black/90 z-[10000] flex flex-col items-center justify-center p-6";
            div.innerHTML = `
                <div class="w-full max-w-[360px] aspect-square rounded-3xl overflow-hidden shadow-2xl border-4 border-white/20">
                    <img src="${src}" class="w-full h-full object-cover">
                </div>
                <p class="text-white font-black mt-8">✨ 專家分析圖卡已就緒</p>
                <p class="text-white/40 text-xs mt-2 mb-8">長按圖片即可儲存至相簿</p>
                <button onclick="this.parentElement.remove()" class="bg-white text-black px-12 py-3 rounded-full font-black">返回修改</button>
            `;
            document.body.appendChild(div);
        }
    </script>
</body>
</html>
