<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>保單理財小管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        
        #loadingOverlay { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 9999; }
        
        /* 1+2x2 矩陣配置 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .kpi-card-main {
            grid-column: span 2;
        }
        
        .soft-shadow { box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
    </style>
</head>
<body class="pb-10">

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/60 flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-indigo-600 font-bold">數據精確計算中...</p>
    </div>

    <div class="max-w-md mx-auto px-4 py-6">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-slate-800">資產分析助手</h1>
                <p class="text-slate-400 text-xs">投資狀態一眼搞定</p>
            </div>
            <div class="bg-indigo-50 px-3 py-1 rounded-full text-right">
                <span class="text-[10px] text-indigo-400 font-bold block leading-none">USD/TWD</span>
                <span id="rateDisplay" class="text-xs font-black text-indigo-600">載入中</span>
            </div>
        </header>

        <div id="uploadArea" class="bg-white p-10 rounded-[2.5rem] soft-shadow border-2 border-dashed border-slate-200 text-center mb-6">
            <div class="text-5xl mb-4">📥</div>
            <h3 class="font-bold text-slate-700 text-lg">請導入 Excel 檔案</h3>
            <p class="text-slate-400 text-sm mb-8">開始您的專業分析</p>
            <input type="file" id="upload" accept=".xlsx, .xls" class="hidden"/>
            <button onclick="document.getElementById('upload').click()" class="bg-slate-900 text-white w-full py-4 rounded-2xl font-bold shadow-xl">選擇檔案</button>
        </div>

        <div id="dashboard" class="hidden space-y-4">
            
            <div class="flex justify-end">
                <button onclick="location.reload()" class="text-xs font-bold text-slate-400 flex items-center gap-1 hover:text-indigo-600 transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    重新上傳檔案
                </button>
            </div>

            <div class="kpi-grid">
                <div class="kpi-card-main bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-2xl">
                    <p class="text-xs font-bold opacity-50 mb-1 tracking-widest">總投資市值 (TWD)</p>
                    <p id="kpi1" class="text-3xl font-black tracking-tight">$0</p>
                </div>

                <div class="bg-blue-100/50 p-5 rounded-[2rem] border border-blue-100">
                    <p class="text-[10px] font-bold text-blue-500 uppercase mb-1">本金獲利</p>
                    <p id="kpi2" class="text-lg font-black text-blue-800">$0</p>
                </div>
                <div class="bg-amber-100/50 p-5 rounded-[2rem] border border-amber-100">
                    <p class="text-[10px] font-bold text-amber-600 uppercase mb-1">累積配息</p>
                    <p id="kpi3" class="text-lg font-black text-amber-800">$0</p>
                </div>
                <div class="bg-indigo-100/50 p-5 rounded-[2rem] border border-indigo-100">
                    <p class="text-[10px] font-bold text-indigo-500 uppercase mb-1">預估月配息</p>
                    <p id="kpi4" class="text-lg font-black text-indigo-800">$0</p>
                </div>
                <div class="bg-emerald-100/50 p-5 rounded-[2rem] border border-emerald-100">
                    <p class="text-[10px] font-bold text-emerald-600 uppercase mb-1">含息總報酬</p>
                    <p id="kpi5" class="text-lg font-black text-emerald-800">$0</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] soft-shadow">
                <div class="flex items-center justify-between mb-4">
                    <label class="text-sm font-black text-slate-700">分析對象</label>
                    <button id="toggleAllBtn" class="text-xs bg-slate-100 px-3 py-1 rounded-full font-bold text-slate-500">查看全體</button>
                </div>
                <select id="clientSelector" class="w-full bg-slate-50 border-0 p-4 rounded-2xl font-bold text-slate-800 mb-6 focus:ring-2 focus:ring-indigo-500 transition-all"></select>
                
                <div id="chartWrapper" class="hidden">
                    <div class="bg-slate-50 p-4 rounded-[2rem]">
                        <canvas id="analysisChart"></canvas>
                    </div>
                </div>
            </div>

            <div id="tableWrapper" class="hidden bg-white rounded-[2.5rem] soft-shadow overflow-hidden">
                <div class="p-5 border-b border-slate-50 flex justify-between items-center">
                    <span class="font-black text-slate-700 text-sm">數據名細</span>
                    <span class="text-[10px] font-bold text-slate-400">TWD</span>
                </div>
                <div id="dataTableBody" class="divide-y divide-slate-50"></div>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let currentUsdRate = 32.25; 
        let myChart = null;
        const FUND_PARAMS = { "DSP5": { nav: 8.4495, divRate: 0.048 }, "NGB2": { nav: 41.81, divRate: 0.23 } };

        const loading = {
            show: () => document.getElementById('loadingOverlay').classList.remove('hidden'),
            hide: () => document.getElementById('loadingOverlay').classList.add('hidden')
        };

        async function updateExchangeRate() {
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await response.json();
                if(data.rates.TWD) {
                    currentUsdRate = data.rates.TWD;
                    document.getElementById('rateDisplay').innerText = currentUsdRate.toFixed(2);
                }
            } catch(e) { document.getElementById('rateDisplay').innerText = currentUsdRate + " (預估)"; }
        }

        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            loading.show();
            const reader = new FileReader();
            reader.onload = function(event) {
                const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                updateExchangeRate().then(() => {
                    initDashboard();
                    setTimeout(loading.hide, 800);
                });
            };
            reader.readAsArrayBuffer(file);
        });

        function calcRow(row) {
            const units = parseFloat(row['累積單位數']) || 0;
            const capital = parseFloat(row['投資本金']) || 0;
            const cumDiv = parseFloat(row['累積配息']) || 0;
            const currency = (row['幣別'] || '').toString().trim();
            const fund = FUND_PARAMS[row['基金標的']] || { nav: 0, divRate: 0 };
            const mvTwd = units * fund.nav * currentUsdRate;
            let totalTwd, divTwd, costTwd, monthDiv;

            if (currency === '美元' || currency === 'USD') {
                divTwd = cumDiv * currentUsdRate;
                costTwd = capital * currentUsdRate;
                totalTwd = (cumDiv + (units * fund.nav) - capital) * currentUsdRate;
                monthDiv = units * fund.divRate * currentUsdRate;
            } else {
                divTwd = cumDiv; costTwd = capital; totalTwd = (cumDiv + mvTwd) - capital;
                monthDiv = units * fund.divRate * 1;
            }
            return { mvTwd, divTwd, costTwd, totalTwd, monthDiv, capRaw: capital };
        }

        function initDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('uploadArea').classList.add('hidden');
            const selector = document.getElementById('clientSelector');
            selector.innerHTML = '<option value="none">請選擇客戶...</option>';
            [...new Set(rawData.map(i => i['客戶名稱']))].forEach(c => {
                const opt = document.createElement('option'); opt.value = c; opt.innerText = c; selector.appendChild(opt);
            });
            renderAnalysis('all');
        }

        function updateKpiUI(k) {
            document.getElementById('kpi1').innerText = '$' + Math.round(k.mv).toLocaleString();
            document.getElementById('kpi2').innerText = '$' + Math.round(k.total - k.div).toLocaleString();
            document.getElementById('kpi3').innerText = '$' + Math.round(k.div).toLocaleString();
            document.getElementById('kpi4').innerText = '$' + Math.round(k.month).toLocaleString();
            document.getElementById('kpi5').innerText = '$' + Math.round(k.total).toLocaleString();
        }

        document.getElementById('clientSelector').addEventListener('change', e => renderAnalysis(e.target.value));
        document.getElementById('toggleAllBtn').addEventListener('click', () => renderAnalysis('all'));

        function renderAnalysis(name) {
            if(name === 'none') return;
            const isAll = name === 'all';
            const filtered = isAll ? rawData : rawData.filter(d => d['客戶名稱'] === name);
            const tbody = document.getElementById('dataTableBody');
            document.getElementById('tableWrapper').classList.remove('hidden');
            document.getElementById('chartWrapper').classList.toggle('hidden', isAll);
            
            tbody.innerHTML = '';
            let k = { mv: 0, div: 0, month: 0, total: 0, cost: 0 };

            filtered.forEach(r => {
                const res = calcRow(r);
                k.mv += res.mvTwd; k.div += res.divTwd; k.month += res.monthDiv; k.total += res.totalTwd; k.cost += res.costTwd;
                tbody.innerHTML += `
                    <div class="p-5 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-slate-800">${r['客戶名稱']}</p>
                            <p class="text-[10px] text-slate-400 uppercase tracking-tighter">${r['保單號碼']} | ${r['基金標的']}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black ${res.totalTwd >= 0 ? 'text-emerald-500' : 'text-rose-500'}">$${Math.round(res.totalTwd).toLocaleString()}</p>
                            <p class="text-[10px] text-slate-400">獲利</p>
                        </div>
                    </div>`;
            });

            updateKpiUI(k);
            if(!isAll) updateChart(k);
        }

        function updateChart(data) {
            const ctx = document.getElementById('analysisChart').getContext('2d');
            if (myChart) myChart.destroy();
            const values = [data.mv/10000, data.div/5000, data.cost/10000, data.month/100, Math.max(0, data.total/1000)];
            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['資產', '領息', '投入', '月收', '獲利'],
                    datasets: [{
                        data: values,
                        backgroundColor: 'rgba(99, 102, 241, 0.2)',
                        borderColor: '#6366f1',
                        borderWidth: 2,
                        pointBackgroundColor: '#6366f1'
                    }]
                },
                options: {
                    scales: { r: { ticks: { display: false }, grid: { color: '#f1f5f9' }, pointLabels: { font: { weight: 'bold' } } } },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
