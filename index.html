<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資型保單統計</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 p-5">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">投資型保單統計</h1>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border-2 border-dashed border-gray-300 text-center">
            <input type="file" id="upload" accept=".xlsx, .xls" class="mx-auto block w-full max-w-xs text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
        </div>

        <div id="dashboard" class="hidden">
            <div class="mb-6 flex flex-wrap items-center justify-between bg-white p-4 rounded-lg shadow-sm border border-gray-100 gap-4">
                <div>
                    <label class="font-bold text-gray-700 mr-2">客戶選擇：</label>
                    <select id="clientSelector" class="border border-gray-300 p-2 rounded bg-white w-48 focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div class="text-sm font-medium">
                    <span class="text-blue-600">最新美金匯率基準：<span id="rateDisplay">31.3245</span></span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
                <div class="bg-slate-700 text-white p-5 rounded-xl shadow-md text-center">
                    <p class="text-xs opacity-80 mb-1">投資型總市值 (TWD)</p>
                    <p id="kpi1" class="text-2xl font-bold">$0</p>
                </div>
                <div class="bg-blue-600 text-white p-5 rounded-xl shadow-md text-center">
                    <p class="text-xs opacity-80 mb-1">本金獲利 (TWD)</p>
                    <p id="kpi2" class="text-2xl font-bold">$0</p>
                </div>
                <div class="bg-amber-500 text-white p-5 rounded-xl shadow-md text-center">
                    <p class="text-xs opacity-80 mb-1">累積配息 (TWD)</p>
                    <p id="kpi3" class="text-2xl font-bold">$0</p>
                </div>
                <div class="bg-indigo-600 text-white p-5 rounded-xl shadow-md text-center">
                    <p class="text-xs opacity-80 mb-1">每月配息預估 (TWD)</p>
                    <p id="kpi4" class="text-2xl font-bold">$0</p>
                </div>
                <div class="bg-rose-600 text-white p-5 rounded-xl shadow-md text-center">
                    <p class="text-xs opacity-80 mb-1">含息總報酬 (TWD)</p>
                    <p id="kpi5" class="text-2xl font-bold">$0</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-600 text-sm">
                        <tr>
                            <th class="p-4 border-b">客戶名稱</th>
                            <th class="p-4 border-b text-right">投資本金(原幣)</th>
                            <th class="p-4 border-b text-right">平均匯率</th>
                            <th class="p-4 border-b text-right">最新匯率</th>
                            <th class="p-4 border-b text-right font-bold">含息總報酬 (TWD)</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="divide-y divide-gray-100 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let currentUsdRate = 31.3245; 

        const FUND_DATA = {
            "DSP5": { nav: 8.4495, divPerUnit: 0.05 }, 
            "NGB2": { nav: 41.81, divPerUnit: 0.23 } 
        };

        async function fetchExRate() {
            try {
                const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://www.fubon.com/banking/personal/deposit/exchange_rate/exchange_rate_tw.htm')}`;
                const res = await fetch(url);
                const data = await res.json();
                const doc = new DOMParser().parseFromString(data.contents, 'text/html');
                const rows = doc.querySelectorAll('tr');
                for (let row of rows) {
                    if (row.innerText.includes('美金')) {
                        const rate = parseFloat(row.querySelectorAll('td')[2].innerText.trim());
                        if (!isNaN(rate)) {
                            currentUsdRate = rate;
                            document.getElementById('rateDisplay').innerText = rate;
                            return;
                        }
                    }
                }
            } catch (e) { console.warn("匯率更新失敗，維持預設。"); }
        }

        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                await fetchExRate();
                initDashboard();
            };
            reader.readAsArrayBuffer(file);
        });

        function initDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            const selector = document.getElementById('clientSelector');
            selector.innerHTML = '<option value="all">全體客戶</option>';
            const clients = [...new Set(rawData.map(item => item['客戶名稱']))];
            clients.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.innerText = c;
                selector.appendChild(opt);
            });
            renderAnalysis('all');
        }

        document.getElementById('clientSelector').addEventListener('change', (e) => renderAnalysis(e.target.value));

        function renderAnalysis(filter) {
            const filtered = filter === 'all' ? rawData : rawData.filter(d => d['客戶名稱'] === filter);
            let kpi = { mv: 0, gain: 0, div: 0, monthly: 0, total: 0 };
            const tableBody = document.getElementById('dataTableBody');
            tableBody.innerHTML = '';

            filtered.forEach(row => {
                const units = parseFloat(row['累積單位數']) || 0;
                const capital = parseFloat(row['投資本金']) || 0;
                const cumDiv = parseFloat(row['累積配息']) || 0;
                const avgEx = parseFloat(row['平均匯率']) || 1;
                const fundTag = row['基金標的'];

                const fund = FUND_DATA[fundTag] || { nav: 0, divPerUnit: 0 };

                let totalReturnTwd = 0;
                const currentMvTwd = units * fund.nav * currentUsdRate;
                const currentDivTwd = cumDiv * currentUsdRate;

                // --- 核心修正算法 ---
                if (avgEx === 1) {
                    // 美元投入：(累積配息(USD) + 累積單位*最新淨值 - 投入本金(USD)) * 最新匯率
                    const totalProfitUsd = (cumDiv + (units * fund.nav)) - capital;
                    totalReturnTwd = totalProfitUsd * currentUsdRate;
                } else {
                    // 台幣投入：(累積配息(TWD) + 累積單位*最新淨值*最新匯率) - 投入本金(TWD)
                    // 投入本金(TWD) = 投入本金(原幣) * 平均匯率
                    const costTwd = capital * avgEx;
                    totalReturnTwd = (currentDivTwd + currentMvTwd) - costTwd;
                }

                kpi.mv += currentMvTwd;
                kpi.gain += (currentMvTwd - (capital * avgEx));
                kpi.div += currentDivTwd;
                kpi.monthly += (units * fund.divPerUnit * currentUsdRate);
                kpi.total += totalReturnTwd;

                tableBody.innerHTML += `
                    <tr>
                        <td class="p-4 border-b font-medium">${row['客戶名稱']}</td>
                        <td class="p-4 border-b text-right">${capital.toLocaleString()}</td>
                        <td class="p-4 border-b text-right text-gray-400">${avgEx}</td>
                        <td class="p-4 border-b text-right text-blue-600 font-bold">${currentUsdRate}</td>
                        <td class="p-4 border-b text-right font-bold ${totalReturnTwd >= 0 ? 'text-green-600' : 'text-red-600'}">
                            $${Math.round(totalReturnTwd).toLocaleString()}
                        </td>
                    </tr>
                `;
            });

            document.getElementById('kpi1').innerText = '$' + Math.round(kpi.mv).toLocaleString();
            document.getElementById('kpi2').innerText = '$' + Math.round(kpi.gain).toLocaleString();
            document.getElementById('kpi3').innerText = '$' + Math.round(kpi.div).toLocaleString();
            document.getElementById('kpi4').innerText = '$' + Math.round(kpi.monthly).toLocaleString();
            document.getElementById('kpi5').innerText = '$' + Math.round(kpi.total).toLocaleString();
        }
    </script>
</body>
</html>
