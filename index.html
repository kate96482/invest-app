<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>財富管理</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-title" content="財富管理">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc; 
            overflow-x: hidden;
        }
        .feature-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .feature-card:hover { transform: translateY(-3px); box-shadow: 0 15px 20px -5px rgb(0 0 0 / 0.1); }
        
        /* 確保內容在小螢幕也能一頁呈現 */
        @media (max-height: 700px) {
            .main-container { padding-top: 1.5rem; padding-bottom: 1.5rem; }
            .header-section { margin-bottom: 1.5rem; }
            .card-grid { gap: 1rem; }
            .feature-card { height: 10rem; }
        }
    </style>
</head>
<body class="p-4 sm:p-6">
    <div class="max-w-2xl mx-auto py-8 sm:py-12 main-container">
        <header class="mb-8 sm:mb-10 header-section">
            <h1 class="text-3xl sm:text-4xl font-black text-slate-900 mb-2">財富管理</h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-xs sm:text-sm">Asset & Tax Management System</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 card-grid">
            <a href="invest.html" class="feature-card bg-slate-900 p-6 sm:p-8 rounded-[1.5rem] sm:rounded-[2rem] text-white flex flex-col justify-between h-48 sm:h-52 relative overflow-hidden group">
                <div class="relative z-10">
                    <div class="w-10 h-10 sm:w-12 sm:h-12 bg-white/10 rounded-xl sm:rounded-2xl flex items-center justify-center mb-3 group-hover:bg-amber-400 transition-colors">
                        <span class="text-xl sm:text-2xl">📊</span>
                    </div>
                    <h2 class="text-xl sm:text-2xl font-black">資產分析助手</h2>
                    <p class="text-slate-400 mt-1 text-xs sm:text-sm font-bold">即時追蹤市場價值與趨勢</p>
                </div>
                <div class="relative z-10 flex items-center text-[10px] sm:text-xs font-black tracking-widest uppercase text-amber-400">
                    進入系統 <span class="ml-2">→</span>
                </div>
                <div class="absolute -right-4 -bottom-4 text-white/5 text-6xl sm:text-7xl font-black italic uppercase select-none">Invest</div>
            </a>

            <div class="feature-card bg-white p-6 sm:p-8 rounded-[1.5rem] sm:rounded-[2rem] border border-slate-100 shadow-sm flex flex-col justify-between h-48 sm:h-52 opacity-60">
                <div>
                    <div class="w-10 h-10 sm:w-12 sm:h-12 bg-slate-100 rounded-xl sm:rounded-2xl flex items-center justify-center mb-3">
                        <span class="text-xl sm:text-2xl">📜</span>
                    </div>
                    <h2 class="text-xl sm:text-2xl font-black text-slate-800">稅務規劃系統</h2>
                    <p class="text-slate-400 mt-1 text-xs sm:text-sm font-bold">即將推出：計算與評估</p>
                </div>
                <div class="text-[9px] sm:text-[10px] font-black tracking-widest uppercase text-slate-300">
                    Under Development
                </div>
            </div>

            <div class="feature-card bg-white p-6 sm:p-8 rounded-[1.5rem] sm:rounded-[2rem] border border-slate-100 shadow-sm flex flex-col justify-between h-48 sm:h-52 opacity-60">
                <div>
                    <div class="w-10 h-10 sm:w-12 sm:h-12 bg-slate-100 rounded-xl sm:rounded-2xl flex items-center justify-center mb-3">
                        <span class="text-xl sm:text-2xl">🛡️</span>
                    </div>
                    <h2 class="text-xl sm:text-2xl font-black text-slate-800">風險控管</h2>
                    <p class="text-slate-400 mt-1 text-xs sm:text-sm font-bold">資產比例與風險評估</p>
                </div>
                <div class="text-[9px] sm:text-[10px] font-black tracking-widest uppercase text-slate-300">
                    Under Development
                </div>
            </div>
        </div>

        <footer class="mt-12 sm:mt-16 text-center">
            <p class="text-[9px] sm:text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">© 2026 Asset Management System Pro</p>
        </footer>
    </div>

    <script>
        
        (function(document, navigator, standalone) {
            if ((standalone in navigator) && navigator[standalone]) {
                document.addEventListener('click', function(e) {
                    let noddy = e.target;
                    while (noddy && noddy.nodeName !== "A" && noddy.nodeName !== "HTML") {
                        noddy = noddy.parentNode;
                    }
                    if (noddy && "href" in noddy && noddy.hostname === window.location.hostname) {
                        e.preventDefault();
                        window.location.replace(noddy.href);
                    }
                }, false);
            }
        })(document, window.navigator, 'standalone');
    </script>
</body>
</html>
