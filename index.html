<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資型保單統計</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 p-5">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">投資型保單統計</h1>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border-2 border-dashed border-gray-300 text-center">
            <input type="file" id="upload" accept=".xlsx, .xls" class="mx-auto block w-full max-w-xs text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
        </div>

        <div id="dashboard" class="hidden">
            <div class="mb-6 flex flex-wrap items-center justify-between bg-white p-4 rounded-lg shadow-sm border border-gray-100 gap-4">
                <div>
                    <label class="font-bold text-gray-700 mr-2">客戶選擇：</label>
                    <select id="clientSelector" class="border border-gray-300 p-2 rounded bg-white w-48"></select>
                </div>
                <div class="text-sm text-gray-400">
                    數據更新時間：2026/03/01
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
                <div class="bg-blue-600 text-white p-5 rounded-xl shadow-md">
                    <p class="text-xs opacity-80 mb-1">投資型總市值 (TWD)</p>
                    <p id="kpi1" class="text-2xl font-bold">$0</p>
                </div>
                <div class="bg-green-600 text-white p-5 rounded-xl shadow-md">
                    <p class="text-xs opacity-80 mb-1">本金獲利 (TWD)</p>
                    <p id="kpi2" class="text-2xl font-bold">$0</p>
                </div>
                <div class="bg-orange-500 text-white p-5 rounded-xl shadow-md">
                    <p class="text-xs opacity-80 mb-1">已領配息 (TWD)</p>
                    <p id="kpi3" class="text-2xl font-bold">$0</p>
                </div>
                <div class="bg-purple-600 text-white p-5 rounded-xl shadow-md">
                    <p class="text-xs opacity-80 mb-1">每月配息預估 (TWD)</p>
                    <p id="kpi4" class="text-2xl font-bold">$0</p>
                </div>
                <div class="bg-red-600 text-white p-5 rounded-xl shadow-md">
                    <p class="text-xs opacity-80 mb-1">含息總報酬 (TWD)</p>
                    <p id="kpi5" class="text-2xl font-bold">$0</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-600">
                        <tr>
                            <th class="p-4 border-b">客戶名稱</th>
                            <th class="p-4 border-b">投資本金 (原幣)</th>
                            <th class="p-4 border-b">平均匯率</th>
                            <th class="p-4 border-b">最新含息回報 (TWD)</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        const currentUsdRate = 31.3245; 
        const FUND_DATA = {
            "DSP5": { nav: 8.4495, divAmt: 0.05 }, 
            "NGB2": { nav: 41.81, divAmt: 0.23 } 
        };

        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                initDashboard();
            };
            reader.readAsArrayBuffer(file);
        });

        function initDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            const selector = document.getElementById('clientSelector');
            selector.innerHTML = '<option value="all">全體客戶</option>';
            const clients = [...new Set(rawData.map(item => item['客戶名稱']))];
            clients.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.innerText = c;
                selector.appendChild(opt);
            });
            renderAnalysis('all');
        }

        document.getElementById('clientSelector').addEventListener('change', (e) => renderAnalysis(e.target.value));

        function renderAnalysis(filter) {
            const filtered = filter === 'all' ? rawData : rawData.filter(d => d['客戶名稱'] === filter);
            let kpi = { mv: 0, gain: 0, div: 0, monthly: 0, total: 0 };
            const tableBody = document.getElementById('dataTableBody');
            tableBody.innerHTML = '';

            filtered.forEach(row => {
                const units = parseFloat(row['累積單位數']) || 0;
                const capital = parseFloat(row['投資本金']) || 0;
                const cumDiv = parseFloat(row['累積配息']) || 0;
                const avgEx = parseFloat(row['平均匯率']) || 1;
                const fund = FUND_DATA[row['基金標的']] || { nav: 0, divAmt: 0 };
                
                const mvTwd = units * fund.nav * currentUsdRate;
                const costTwd = capital * avgEx;
                const divTwd = cumDiv * currentUsdRate;
                const monthlyTwd = units * fund.divAmt * currentUsdRate;
                const totalRetTwd = (mvTwd + divTwd) - costTwd;

                kpi.mv += mvTwd;
                kpi.gain += (mvTwd - costTwd);
                kpi.div += divTwd;
                kpi.monthly += monthlyTwd;
                kpi.total += totalRetTwd;

                tableBody.innerHTML += `
                    <tr>
                        <td class="p-4 border-b">${row['客戶名稱']}</td>
                        <td class="p-4 border-b">${capital.toLocaleString()}</td>
                        <td class="p-4 border-b text-gray-500">${avgEx}</td>
                        <td class="p-4 border-b font-bold ${totalRetTwd >= 0 ? 'text-green-600' : 'text-red-600'}">
                            $${Math.round(totalRetTwd).toLocaleString()}
                        </td>
                    </tr>
                `;
            });

            document.getElementById('kpi1').innerText = '$' + Math.round(kpi.mv).toLocaleString();
            document.getElementById('kpi2').innerText = '$' + Math.round(kpi.gain).toLocaleString();
            document.getElementById('kpi3').innerText = '$' + Math.round(kpi.div).toLocaleString();
            document.getElementById('kpi4').innerText = '$' + Math.round(kpi.monthly).toLocaleString();
            document.getElementById('kpi5').innerText = '$' + Math.round(kpi.total).toLocaleString();
        }
    </script>
</body>
</html>
