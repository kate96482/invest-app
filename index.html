<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>資產分析助手 v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .soft-shadow { box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .gold-gradient { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); }
        /* 隱藏但存在的渲染容器 */
        #renderCanvas {
            position: absolute; left: -9999px; top: 0;
            width: 500px; height: 500px; /* 強制正方形 */
            background: white; padding: 40px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-sizing: border-box;
        }
    </style>
</head>
<body class="pb-10">

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/80 flex flex-col items-center justify-center z-[9999]">
        <div class="w-12 h-12 border-4 border-slate-900 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold text-slate-800">正在構建 1:1 分析圖卡...</p>
    </div>

    <div class="max-w-md mx-auto px-4 py-6">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">資產分析助手</h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Market Real-time Sync</p>
            </div>
            <div class="bg-white px-3 py-1 rounded-xl border border-slate-100 shadow-sm text-right">
                <span class="text-[9px] text-slate-400 font-bold block">USD/TWD</span>
                <span id="rateDisplay" class="text-sm font-black text-indigo-600">--.--</span>
            </div>
        </header>

        <div id="uploadArea" class="bg-white p-10 rounded-[2.5rem] soft-shadow border-2 border-dashed border-slate-200 text-center mb-6">
            <div class="text-4xl mb-4">📊</div>
            <h3 class="font-bold text-slate-700">匯入 Excel 數據</h3>
            <input type="file" id="upload" accept=".xlsx, .xls" class="hidden"/>
            <button onclick="document.getElementById('upload').click()" class="mt-6 bg-slate-900 text-white w-full py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">選擇檔案</button>
        </div>

        <div id="dashboard" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2 bg-slate-900 p-6 rounded-[2.5rem] text-white relative overflow-hidden">
                    <p class="text-[10px] font-bold opacity-50 uppercase tracking-widest">總投資市值 (TWD)</p>
                    <p id="kpi1" class="text-3xl font-black mt-1">$0</p>
                    <div class="absolute -right-2 -bottom-2 text-white/5 text-5xl font-black italic">ASSET</div>
                </div>

                <div class="bg-blue-50 p-5 rounded-[2rem] border border-blue-100/50 relative">
                    <p class="text-[10px] font-bold text-blue-400 uppercase">投入本金</p>
                    <p id="kpi2" class="text-lg font-black text-blue-900 mt-1">$0</p>
                    <span id="marketFluctPercent" class="absolute top-3 right-3 text-[9px] font-black px-1.5 py-0.5 rounded-md hidden"></span>
                </div>

                <div class="bg-amber-50 p-5 rounded-[2rem] border border-amber-100/50">
                    <p class="text-[10px] font-bold text-amber-500 uppercase">累積配息</p>
                    <p id="kpi3" class="text-lg font-black text-amber-900 mt-1">$0</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[3rem] soft-shadow border border-slate-50">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 block">分析對象切換</label>
                <select id="clientSelector" class="w-full bg-slate-50 border-0 p-4 rounded-2xl font-bold text-slate-800 mb-6 outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-indigo-500"></select>
                
                <div id="individualAnalysis" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="flex justify-between items-end mb-4 px-1">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">配息預測</p>
                            <h3 class="font-black text-slate-800 text-lg">增長趨勢圖表</h3>
                        </div>
                        <span id="indivDivTotal" class="text-amber-500 font-black text-xl">$0</span>
                    </div>

                    <div class="h-28 w-full bg-slate-50 rounded-3xl flex items-end p-3 gap-2 mb-4">
                        <div class="flex-1 bg-amber-100 rounded-xl" style="height: 20%"></div>
                        <div class="flex-1 bg-amber-200 rounded-xl" style="height: 40%"></div>
                        <div class="flex-1 bg-amber-300 rounded-xl" style="height: 60%"></div>
                        <div class="flex-1 bg-amber-400 rounded-xl" style="height: 80%"></div>
                        <div class="flex-1 gold-gradient rounded-xl shadow-md" style="height: 100%"></div>
                    </div>

                    <div class="p-5 bg-amber-50/50 rounded-3xl border border-amber-100 text-center mb-6">
                        <p class="text-xs text-amber-800 font-bold">累積回本率：<span id="indivPaybackRate" class="text-amber-600 font-black text-xl ml-1">0%</span></p>
                    </div>

                    <button id="exportImgBtn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition-all">生成 1:1 正方形圖卡</button>
                </div>
            </div>
        </div>
    </div>

    <div id="renderCanvas">
        <div style="text-align: center;">
            <div id="renderTag" style="display:inline-block; background:#f1f5f9; padding:4px 12px; border-radius:100px; font-size:10px; font-weight:900; color:#64748b; margin-bottom:8px;">OFFICIAL REPORT</div>
            <h2 id="renderName" style="margin:0; font-size:28px; font-weight:900; color:#1e293b;">客戶名稱</h2>
            <p style="margin:4px 0 0 0; font-size:12px; color:#94a3b8; font-weight:500;">資產配置與配息增長分析</p>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div style="grid-column: span 2; background:#0f172a; padding:25px; border-radius:30px; color:white;">
                <p style="margin:0; font-size:12px; opacity:0.6; font-weight:700;">總投資市值 (TWD)</p>
                <p id="r-kpi1" style="margin:8px 0 0 0; font-size:42px; font-weight:900;">$0</p>
            </div>
            <div style="background:#eff6ff; padding:20px; border-radius:25px; position:relative; border:1px solid #dbeafe;">
                <p style="margin:0; font-size:11px; color:#3b82f6; font-weight:800;">投入本金</p>
                <p id="r-kpi2" style="margin:5px 0 0 0; font-size:20px; font-weight:900; color:#1e3a8a;">$0</p>
                <span id="r-fluct" style="position:absolute; top:15px; right:15px; font-size:10px; font-weight:900; padding:2px 6px; border-radius:6px;"></span>
            </div>
            <div style="background:#fffbeb; padding:20px; border-radius:25px; border:1px solid #fef3c7;">
                <p style="margin:0; font-size:11px; color:#f59e0b; font-weight:800;">累積配息</p>
                <p id="r-kpi3" style="margin:5px 0 0 0; font-size:20px; font-weight:900; color:#78350f;">$0</p>
            </div>
        </div>

        <div>
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:12px;">
                <p style="margin:0; font-size:14px; font-weight:900; color:#1e293b;">配息回本趨勢</p>
                <p id="r-payback" style="margin:0; font-size:24px; font-weight:900; color:#d97706;">0%</p>
            </div>
            <div style="height:80px; width:100%; background:#f8fafc; border-radius:20px; display:flex; align-items:flex-end; padding:8px; gap:8px; box-sizing:border-box; border:1px solid #f1f5f9;">
                <div style="flex:1; background:#fef3c7; border-radius:8px; height:20%;"></div>
                <div style="flex:1; background:#fde68a; border-radius:8px; height:40%;"></div>
                <div style="flex:1; background:#fcd34d; border-radius:8px; height:60%;"></div>
                <div style="flex:1; background:#fbbf24; border-radius:8px; height:80%;"></div>
                <div style="flex:1; background:linear-gradient(to bottom, #fbbf24, #d97706); border-radius:8px; height:100%;"></div>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let currentUsdRate = 32.5;
        const FUND_PARAMS = { "DSP5": { nav: 8.4495 }, "NGB2": { nav: 41.81 } };

        async function syncRate() {
            try {
                const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQHKETau10x9H1XCGiO-nDUdlgB7eMIYMTi25y5-ZYiUECEDnNHN22CxxVvitdmTLUZAHSVBrZCbK2P/pub?gid=0&single=true&output=csv");
                const text = await res.text();
                text.split('\n').forEach(row => {
                    const [k, v] = row.split(',');
                    if (k.trim() === "USD_TWD") currentUsdRate = parseFloat(v);
                    if (k.trim() === "DSP5_NAV") FUND_PARAMS["DSP5"].nav = parseFloat(v);
                    if (k.trim() === "NGB2_NAV") FUND_PARAMS["NGB2"].nav = parseFloat(v);
                });
                document.getElementById('rateDisplay').innerText = currentUsdRate.toFixed(2);
            } catch (e) { console.error("Rate Sync Fail"); }
        }

        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(ev) {
                const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
                rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                syncRate().then(initSelector);
            };
            reader.readAsArrayBuffer(file);
        });

        function initSelector() {
            document.getElementById('uploadArea').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            const sel = document.getElementById('clientSelector');
            sel.innerHTML = '<option value="">請選擇客戶...</option>';
            [...new Set(rawData.map(r => r['客戶名稱']))].forEach(c => {
                const opt = document.createElement('option'); opt.value = opt.innerText = c; sel.appendChild(opt);
            });
        }

        document.getElementById('clientSelector').onchange = function(e) {
            const name = e.target.value;
            if(!name) return;
            document.getElementById('individualAnalysis').classList.remove('hidden');
            updateUI(name);
        };

        function updateUI(name) {
            const data = rawData.filter(r => r['客戶名稱'] === name);
            let mv = 0, cap = 0, div = 0;
            
            data.forEach(r => {
                const isUsd = r['幣別'] === '美元' || r['幣別'] === 'USD';
                const rate = isUsd ? currentUsdRate : 1;
                const fund = FUND_PARAMS[r['基金標的']] || { nav: 0 };
                
                mv += (parseFloat(r['累積單位數']) || 0) * fund.nav * currentUsdRate; // 基金市值統一轉台幣
                cap += (parseFloat(r['投資本金']) || 0) * rate;
                div += (parseFloat(r['累積配息']) || 0) * rate;
            });

            const fluctPct = cap > 0 ? ((mv - cap) / cap * 100) : 0;
            const pbRate = cap > 0 ? (div / cap * 100).toFixed(2) : 0;

            // 更新介面
            document.getElementById('kpi1').innerText = '$' + Math.round(mv).toLocaleString();
            document.getElementById('kpi2').innerText = '$' + Math.round(cap).toLocaleString();
            document.getElementById('kpi3').innerText = '$' + Math.round(div).toLocaleString();
            document.getElementById('indivDivTotal').innerText = '$' + Math.round(div).toLocaleString();
            document.getElementById('indivPaybackRate').innerText = pbRate + '%';

            const fluctEl = document.getElementById('marketFluctPercent');
            fluctEl.classList.remove('hidden');
            fluctEl.innerText = (fluctPct >= 0 ? '+' : '') + fluctPct.toFixed(2) + '%';
            fluctEl.className = `absolute top-3 right-3 text-[9px] font-black px-1.5 py-0.5 rounded-md ${fluctPct >= 0 ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`;

            // 更新渲染畫布 (1:1 圖卡)
            document.getElementById('renderName').innerText = name;
            document.getElementById('r-kpi1').innerText = '$' + Math.round(mv).toLocaleString();
            document.getElementById('r-kpi2').innerText = '$' + Math.round(cap).toLocaleString();
            document.getElementById('r-kpi3').innerText = '$' + Math.round(div).toLocaleString();
            document.getElementById('r-payback').innerText = pbRate + '%';
            
            const rFluct = document.getElementById('r-fluct');
            rFluct.innerText = (fluctPct >= 0 ? '+' : '') + fluctPct.toFixed(2) + '%';
            rFluct.style.background = fluctPct >= 0 ? '#d1fae5' : '#fee2e2';
            rFluct.style.color = fluctPct >= 0 ? '#059669' : '#dc2626';
        }

        document.getElementById('exportImgBtn').onclick = async function() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            const canvas = await html2canvas(document.getElementById('renderCanvas'), {
                scale: 3,
                width: 500,
                height: 500,
                backgroundColor: "#ffffff",
                logging: false
            });
            
            const imgData = canvas.toDataURL("image/png");
            const preview = document.createElement('div');
            preview.className = "fixed inset-0 bg-black/90 z-[10000] flex flex-col items-center justify-center p-6";
            preview.innerHTML = `
                <div style="width:100%; max-w-[380px]; aspect-ratio:1/1; border-radius:24px; overflow:hidden; box-shadow:0 30px 60px rgba(0,0,0,0.5);">
                    <img src="${imgData}" style="width:100%; height:100%; display:block;">
                </div>
                <p class="text-white font-bold mt-8 mb-2">圖卡已準備就緒</p>
                <p class="text-white/50 text-xs mb-8">請長按圖片選擇「儲存影像」</p>
                <button onclick="this.parentElement.remove()" class="bg-white text-black px-10 py-3 rounded-full font-bold">關閉預覽</button>
            `;
            document.body.appendChild(preview);
            document.getElementById('loadingOverlay').classList.add('hidden');
        };
    </script>
</body>
</html>
