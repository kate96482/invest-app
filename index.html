<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>財富管理</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-title" content="財富管理">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc; 
            overflow: hidden; /* 防止捲動，達成一頁呈現 */
        }
        .feature-card { transition: all 0.3s ease; }
        .feature-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-lg mx-auto">
        <header class="mb-6 ml-1">
            <h1 class="text-2xl font-black text-slate-900 mb-1">管理中心</h1>
            <p class="text-slate-500 font-bold uppercase tracking-tighter text-[10px]">Asset & Tax Management System</p>
        </header>

        <div class="grid grid-cols-2 gap-3">
            <a href="invest.html" class="col-span-2 feature-card bg-slate-900 p-5 rounded-[1.5rem] text-white flex flex-col justify-between h-40 relative overflow-hidden group">
                <div class="relative z-10">
                    <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center mb-2">
                        <span class="text-xl">📊</span>
                    </div>
                    <h2 class="text-xl font-black">資產分析助手</h2>
                    <p class="text-slate-400 text-xs font-bold">即時追蹤市場價值與趨勢</p>
                </div>
                <div class="relative z-10 flex items-center text-[10px] font-black tracking-widest uppercase text-amber-400">
                    進入系統 <span class="ml-1">→</span>
                </div>
                <div class="absolute -right-2 -bottom-2 text-white/5 text-5xl font-black italic uppercase select-none">Invest</div>
            </a>

            <div class="feature-card bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm flex flex-col justify-between h-36 opacity-60">
                <div>
                    <div class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center mb-2">
                        <span class="text-lg">📜</span>
                    </div>
                    <h2 class="text-base font-black text-slate-800 leading-tight">稅務規劃</h2>
                    <p class="text-slate-400 text-[10px] font-bold mt-1">即將推出</p>
                </div>
                <div class="text-[8px] font-black tracking-widest uppercase text-slate-300">Coming Soon</div>
            </div>

            <div class="feature-card bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm flex flex-col justify-between h-36 opacity-60">
                <div>
                    <div class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center mb-2">
                        <span class="text-lg">🛡️</span>
                    </div>
                    <h2 class="text-base font-black text-slate-800 leading-tight">風險控管</h2>
                    <p class="text-slate-400 text-[10px] font-bold mt-1">資產評估</p>
                </div>
                <div class="text-[8px] font-black tracking-widest uppercase text-slate-300">Developing</div>
            </div>
        </div>

        <footer class="mt-8 text-center">
            <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">© 2026 Asset Management System Pro</p>
        </footer>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW register failed:', err));
            });
        }

        (function(document, navigator, standalone) {
            if ((standalone in navigator) && navigator[standalone]) {
                document.addEventListener('click', function(e) {
                    let noddy = e.target;
                    while (noddy && noddy.nodeName !== "A" && noddy.nodeName !== "HTML") {
                        noddy = noddy.parentNode;
                    }
                    if (noddy && "href" in noddy && noddy.hostname === window.location.hostname) {
                        e.preventDefault();
                        window.location.replace(noddy.href);
                    }
                }, false);
            }
        })(document, window.navigator, 'standalone');
    </script>
</body>
</html>
